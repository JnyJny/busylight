name: Deploy Documentation

on:
  repository_dispatch:
    types: [release-core, release-cli]
  workflow_dispatch:
    inputs:
      package:
        description: "Which package docs to build"
        required: true
        default: "core"
        type: choice
        options:
          - core
          - cli
          - both

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-core-docs:
    name: Build Core Documentation
    if: |
      github.event_name == 'repository_dispatch' && github.event.action == 'release-core' ||
      github.event_name == 'workflow_dispatch' && (inputs.package == 'core' || inputs.package == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable GitHub Pages
        run: |
          if ! gh api repos/:owner/:repo/pages >/dev/null 2>&1; then
            gh api --method POST repos/:owner/:repo/pages \
              -f build_type=workflow 2>/dev/null || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: packages/busylight-core
        run: uv sync --group docs

      - name: Build documentation
        working-directory: packages/busylight-core
        run: uv run mkdocs build --strict

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/busylight-core/site/

  deploy-core-docs:
    name: Deploy Core Documentation
    needs: build-core-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
