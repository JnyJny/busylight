name: Test, Publish and Release

on:
  push:
    branches:
      - testing
    tags:
      - 'v*-test'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  get-python-versions:
    name: Get Python test versions from pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.extract.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Python test versions
        id: extract
        run: |
          # Try to extract test versions from pyproject.toml, fallback to default if missing
          if versions=$(uv run toml get --toml-path pyproject.toml tool.busylight_core.ci.test-python-versions 2>/dev/null); then
            echo "Using Python versions from pyproject.toml: $versions"
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            echo "No test-python-versions found in pyproject.toml, using default versions"
            echo 'versions=["3.11", "3.12", "3.13"]' >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: get-python-versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: ${{ fromJSON(needs.get-python-versions.outputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install uv and set Python version.
        uses: astral-sh/setup-uv@v7
        with:          
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run unit tests - ${{ matrix.python-version }} - ${{ matrix.os }}        
        run: uv run --all-extras poe test

      - name: Run doc tests - ${{ matrix.python-version }} - ${{ matrix.os }}
        run: uv run --all-extras poe doc-test

  build:
    name: Build Package
    needs: test
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: |
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/
          retention-days: 1  # Minimum allowed, but artifacts are only needed within same workflow

  publish:
    name: Publish to PyPI
    needs: build
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/busylight_core

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release & Update Changelog
    needs: build
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Generate release notes for this tag
        run: uv run git cliff --latest --strip header > release_notes.md

      - name: Update CHANGELOG.md
        run: uv run git cliff --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(CHANGELOG): update release notes"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          bodyFile: "release_notes.md"
          draft: false
          prerelease: false
          generateReleaseNotes: false
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Documentation
    needs: [publish, github-release]
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger docs deployment
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-complete
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'


