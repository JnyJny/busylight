name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  get-python-versions:
    name: Get Python test versions
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.extract.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Python test versions
        id: extract
        run: |
          if versions=$(uv run toml get --toml-path pyproject.toml tool.busylight_core.ci.test-python-versions 2>/dev/null); then
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            echo 'versions=["3.11", "3.12", "3.13"]' >> $GITHUB_OUTPUT
          fi

  test:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    needs: get-python-versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJSON(needs.get-python-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run unit tests
        run: uv run --all-extras poe test

      - name: Run doc tests
        run: uv run --all-extras poe doc-test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .
