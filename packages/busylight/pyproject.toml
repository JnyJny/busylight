[project]
name = "busylight-for-humans"
version = "0.48.0"
description = "Control USB connected LED lights, like a human."
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "JnyJny", email = "erik.oshaughnessy@gmail.com" }
]
repository = "https://github.com/JnyJny/busylight.git"
requires-python = ">=3.11,<4.0"
dependencies = [
    "busylight-core>=2.2.0",
    "hidapi>=0.14.0.post4",
    "loguru>=0.7.3",
    "pyserial>=3.5",
    "typer>=0.16.0",
    "webcolors>=24.11.1",
]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Development Status :: 4 - Beta",
  "Operating System :: OS Independent",
  "Intended Audience :: Developers",
  "Intended Audience :: End Users/Desktop",
  "Environment :: Console",
  "Topic :: System :: Hardware",
  "Topic :: Utilities",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",  
]

[project.scripts]
busylight = "busylight.__main__:cli"
busyserve = "busylight.busyserve:busyserve_cli"

[project.optional-dependencies]
webapi = [
    "fastapi>=0.115.14",
    "uvicorn>=0.34.2",
]
web = [
    "fastapi>=0.115.14",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.5.44",
    "mkdocs-git-revision-date-localized-plugin>=1.3.0",
]

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "busylight"

[tool.uv.sources]
busylight-core = { workspace = true }

[tool.ruff]
fix = false
line-length = 90

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = [
  # comparison-to-singleton (E711, E712) -- legacy code style
  "E711",
  "E712",
  # type-comparison (E721) -- legacy code style
  "E721",
  # line-too-long (E501) -- handled by formatter
  "E501",
  # unsorted-imports (I001) -- defer to a dedicated cleanup pass
  "I001",
  # unused-variable (F841) -- some are intentional side-effect calls
  "F841",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
  "F841",
]


[dependency-groups]
dev = [
    "anyio>=4.9.0",
    "coverage>=7.8.0",
    "httpx>=0.28.1",
]


[tool.poe.tasks]

# Code Quality

_generate_coverage = "pytest --cov=./src/busylight --cov-report=html"
_open_report = "open htmlcov/index.html"
coverage.sequence = ["_generate_coverage", "_open_report"]
coverage.help = "[Code Quality] Open generated coverage report in a browser."

ruff-check.cmd = "ruff check src tests"
ruff-check.help = "[Code Quality] Run ruff check on source."

ruff-format.cmd = "ruff format src tests"
ruff-format.help = "[Code Quality] Run ruff format on source."

ruff.sequence = ["ruff-check", "ruff-format"]
ruff.help = "[Code Quality] Run Ruff check and format on source."

check.sequence = ["ruff"]
check.help = "[Code Quality] Run all code quality tools on source."

test.cmd = "pytest tests/"
test.help = "[Code Quality] Run unit tests."

qc.sequence = ["test", "check"]
qc.help = "[Code Quality] Run all code quality tasks."

# Publish tasks

_preflight.shell = """
if [ "$(git branch --show-current)" != "main" ]; then
  echo "ERROR: publish must run from main branch" >&2
  exit 1
fi
if [ -n "$(git status --porcelain)" ]; then
  echo "ERROR: working tree is dirty" >&2
  exit 1
fi
"""
_preflight.help = "Verify on main branch with clean working tree."

_patch_bump = "uv version --bump patch"
_minor_bump = "uv version --bump minor"
_major_bump = "uv version --bump major"

_add = "git add pyproject.toml uv.lock"
_commit = {shell = "git commit -m busylight-cli/v`uv version --short`"}
_tag = {shell = "git tag busylight-cli/v`uv version --short`"}
_push = "git push --all"
_push_tags = "git push --tags"

_update_pyproject = ["_add", "_commit", "_tag", "_push_tags", "_push"]

publish_patch = ["_preflight", "_patch_bump", "_update_pyproject"]
publish_minor = ["_preflight", "_minor_bump", "_update_pyproject"]
publish_major = ["_preflight", "_major_bump", "_update_pyproject"]

publish = {ref = "publish_patch"}

# Release

changelog.cmd = "git cliff --include-path 'packages/busylight/**'"
changelog.help = "[Release] Generate full changelog to stdout."

release-notes.cmd = "git cliff --include-path 'packages/busylight/**' --latest --strip header"
release-notes.help = "[Release] Generate release notes for the latest tag."

# Clean

clean.cmd = "rm -rf htmlcov dist busylight.egg-info *.log"
clean.help = "[Clean] Remove testing, build and code quality artifacts."

# Misc

tree.cmd = "tree . -a -I .venv -I .git -I .ruff_cache"
tree.help = "List project files in tree format."

